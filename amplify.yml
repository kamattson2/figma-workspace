version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist/finance-dashboard/browser
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: apps/finance-dashboard
