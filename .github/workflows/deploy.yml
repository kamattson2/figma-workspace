name: Merge Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Classify changed files → visual | functional | none
  # ──────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed File Types
    runs-on: ubuntu-latest
    outputs:
      change_type: ${{ steps.classify.outputs.change_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changes
        id: classify
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          APP_FILES=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
            | grep '^apps/finance-dashboard/' || true)

          VISUAL=$(echo "$APP_FILES"     | grep -E '\.(html|scss)$' || true)
          FUNCTIONAL=$(echo "$APP_FILES" | grep '\.ts$'             \
            | grep -v '\.spec\.ts$'                                  \
            | grep -v '\.figma\.ts$'                                 || true)

          if   [ -n "$FUNCTIONAL" ]; then CHANGE_TYPE="functional"
          elif [ -n "$VISUAL" ];     then CHANGE_TYPE="visual"
          else                            CHANGE_TYPE="none"
          fi

          echo "change_type=$CHANGE_TYPE" >> "$GITHUB_OUTPUT"

          echo "Visual files:"     && echo "${VISUAL:-  (none)}"
          echo "Functional files:" && echo "${FUNCTIONAL:-  (none)}"
          echo "→ Classified as: $CHANGE_TYPE"

  # ──────────────────────────────────────────────────────────────
  # 2. Build — always runs so broken code never reaches main
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/finance-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/finance-dashboard
        run: npm ci

      - name: Build production bundle
        working-directory: apps/finance-dashboard
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # 3a. Visual-only → auto-approved
  # ──────────────────────────────────────────────────────────────
  approve-visual:
    name: "Approve: Visual (Auto)"
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.change_type == 'visual'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Visual-only changes — approved automatically."

  # ──────────────────────────────────────────────────────────────
  # 3b. Functional → pauses for dev approval via GitHub environment
  # ──────────────────────────────────────────────────────────────
  approve-functional:
    name: "Approve: Functional (Requires Review)"
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.change_type == 'functional'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Functional changes approved by reviewer."

  # ──────────────────────────────────────────────────────────────
  # 4. Final gate — this is the required status check
  #    Amplify auto-deploys once this passes and PR is merged
  # ──────────────────────────────────────────────────────────────
  ready-to-merge:
    name: Ready to Merge
    needs: [detect-changes, approve-visual, approve-functional]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          CHANGE_TYPE="${{ needs.detect-changes.outputs.change_type }}"
          VISUAL="${{ needs.approve-visual.result }}"
          FUNCTIONAL="${{ needs.approve-functional.result }}"

          echo "Change type:     $CHANGE_TYPE"
          echo "Visual gate:     $VISUAL"
          echo "Functional gate: $FUNCTIONAL"

          case "$CHANGE_TYPE" in
            none)
              echo "No app changes — passing."
              exit 0
              ;;
            visual)
              [ "$VISUAL" = "success" ] && exit 0
              ;;
            functional)
              [ "$FUNCTIONAL" = "success" ] && exit 0
              ;;
          esac

          echo "Gate did not pass."
          exit 1
