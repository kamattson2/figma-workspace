<div class="layout">
  <main class="main-content" role="main">
    <!-- FIGMA DEMO 1 section divider -->
    <div class="section-header">
      <mat-divider role="separator" aria-hidden="true"></mat-divider>
      <span class="section-label">FIGMA DEMO 1</span>
    </div>

    <div class="content-columns">
      <!-- Left column: form + name button -->
      <div class="form-column">
        <div class="form-row">
          <mat-form-field appearance="fill" class="name-field">
            <mat-label>Enter Name</mat-label>
            <input
              matInput
              [value]="inputText()"
              (input)="onInput($event)"
              placeholder="Placeholder"
              aria-required="true"
            />
            @if (inputText()) {
              <button matSuffix mat-icon-button aria-label="Clear input" (click)="clearInput()">
                <mat-icon>cancel</mat-icon>
              </button>
            }
            <mat-hint>Supporting text</mat-hint>
          </mat-form-field>

          <button mat-flat-button class="submit-btn" type="button" (click)="onSubmit()">
            <mat-icon>check</mat-icon>
            Submit
          </button>
        </div>

        <button mat-flat-button class="name-btn" type="button">
          <mat-icon aria-hidden="true">add_circle_outline</mat-icon>
          {{ submittedName() || 'name' }}
        </button>

        @if (submittedName()) {
          <span class="input-chip" role="status" aria-live="polite">{{ submittedName() }}</span>
        }
      </div>

      <!-- Right column: shortcuts list -->
      <mat-list class="shortcut-list" aria-label="Shortcuts">
        @for (item of listItems(); track $index) {
          <mat-list-item class="shortcut-item">
            <mat-icon matListItemIcon class="leading-icon">add_circle_outline</mat-icon>
            <span matListItemTitle>{{ item.label }}</span>
            <span matListItemMeta class="item-trailing">
              <span class="shortcut-text">{{ item.shortcut }}</span>
              <mat-icon class="chevron-icon">chevron_right</mat-icon>
            </span>
          </mat-list-item>
        }
      </mat-list>
    </div>
  </main>
</div>
